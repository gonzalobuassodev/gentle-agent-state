# agents.conf — tmux agent-state display layer.
# Installed to ~/.config/tmux/agents.conf by install.sh and sourced at the END of
# your tmux config (AFTER your theme/TPM load) so the per-tab state marker can
# EXTEND the theme's window-status-format instead of being overwritten by it.
#
# Colors below are kanagawa's palette (red=#e82424 blocked, orange=#dca561 working).
# Using a different theme? Tweak the hex values to match.

# Per-tab state marker — EXTENDS the theme's real format (preserves its colors/bg),
# only appends "x" or "o" when an agent is busy.
set -g window-status-format         "#[fg=#dcd7ba]#[bg=#2a2a37] #I #W#{?#{==:#{@win_agent_state},blocked}, #[fg=#e82424]x#[fg=#dcd7ba],#{?#{==:#{@win_agent_state},working}, #[fg=#dca561]o#[fg=#dcd7ba],}}"
set -g window-status-current-format "#[fg=#dcd7ba,bg=#54546D] #I #W#{?#{==:#{@win_agent_state},blocked}, #[fg=#e82424]x#[fg=#dcd7ba],#{?#{==:#{@win_agent_state},working}, #[fg=#dca561]o#[fg=#dcd7ba],}} "

# Status-right: PREPEND the silent self-heal heartbeat to whatever the theme set
# (RAM/CPU/git), as a SINGLE status-right string so every #(...) segment renders
# (referencing it via a user option only expands one level and leaves nested #()
# literal). Deferred + backgrounded: themes loaded via TPM set their status-right
# ASYNCHRONOUSLY, so we run AFTER it or our prepend gets clobbered. Idempotent:
# only prepend when our segment isn't already present.
run-shell -b 'sleep 1; ~/.config/tmux/scripts/agent-statusline.sh'
set -g status-interval 2

# Themes loaded via TPM set their status-right ASYNCHRONOUSLY, so the deferred
# prepend above can lose the race and get clobbered — leaving the heartbeat (and
# thus self-heal) dead. Re-apply on client-attached (theme is loaded by then).
set-hook -g client-attached 'run-shell -b "~/.config/tmux/scripts/agent-statusline.sh"'

# Event-driven self-heal: the heartbeat above polls every status-interval, but the
# status-right can be clobbered by the theme. These navigation hooks drive the SAME
# self-heal the instant you go look at an agent — theme-independent, so a blocked
# tab clears the moment you switch to it (after-select-window) or focus its pane.
set-hook -g after-select-window    'run-shell -b "~/.config/tmux/scripts/agent-status.sh"'
set-hook -g after-select-pane      'run-shell -b "~/.config/tmux/scripts/agent-status.sh"'
set-hook -g pane-focus-in          'run-shell -b "~/.config/tmux/scripts/agent-status.sh"'
set-hook -g client-session-changed 'run-shell -b "~/.config/tmux/scripts/agent-status.sh"'

# Visual punch when a window flips to blocked (works alongside the audible alert).
set -g visual-bell on
set -g window-status-bell-style "fg=red,bold"

# Alt+t: toggle Telegram notifications on/off.
bind-key -n M-t run-shell 'f="$HOME/.config/agent-state/telegram.off"; if [ -f "$f" ]; then rm "$f" && tmux display "🔔 Telegram on"; else touch "$f" && tmux display "🔕 Telegram off"; fi'
